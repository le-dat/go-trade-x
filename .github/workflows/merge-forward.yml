name: Merge-forward feature branches

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write

jobs:
  merge-forward:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'
          cache: true

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge main into each feature branch
        id: merge
        run: |
          FAILED=""
          SUCCEEDED=""

          FEATURE_BRANCHES=$(git branch -r --list 'origin/feat/*' | sed 's|origin/||' | xargs)

          if [ -z "$FEATURE_BRANCHES" ]; then
            echo "No feature branches found."
            exit 0
          fi

          for BRANCH in $FEATURE_BRANCHES; do
            FEATURE_NAME=$(echo "$BRANCH" | sed 's|feature/||')
            echo ""
            echo "=== Processing $BRANCH ==="

            # Checkout nhánh
            git checkout -B "$BRANCH" "origin/$BRANCH"

            # Merge branch main vào
            if ! git merge main --no-edit; then
              echo "::warning::Merge conflict in $BRANCH"
              git merge --abort
              FAILED="$FAILED $FEATURE_NAME"
              continue
            fi

            # Kiểm tra xem có gì mới để push không
            if git diff --quiet "origin/$BRANCH"; then
              echo "$BRANCH is already up to date with main."
              SUCCEEDED="$SUCCEEDED $FEATURE_NAME"
              continue
            fi

            # Install dependencies
            go mod download

            # Run build
            if ! make build; then
              echo "::warning::Build failed for $BRANCH"
              git reset --hard "origin/$BRANCH"
              FAILED="$FAILED $FEATURE_NAME"
              continue
            fi

            # Run tests
            if ! make test; then
              echo "::warning::Tests failed for $BRANCH"
              git reset --hard "origin/$BRANCH"
              FAILED="$FAILED $FEATURE_NAME"
              continue
            fi

            # Đẩy lên remote
            git push origin "$BRANCH"
            SUCCEEDED="$SUCCEEDED $FEATURE_NAME"
            echo "$BRANCH merged and pushed successfully."
          done

          echo ""
          echo "=== Results ==="
          echo "Succeeded: $SUCCEEDED"
          echo "Failed: $FAILED"

          # Export kết quả
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "succeeded=$SUCCEEDED" >> "$GITHUB_OUTPUT"

      - name: Open issue for failed merges
        if: steps.merge.outputs.failed != ''
        uses: actions/github-script@v7
        with:
          script: |
            const failed = '${{ steps.merge.outputs.failed }}'.trim().split(/\s+/);
            const sha = context.sha.substring(0, 7);
            const body = [
              `The merge-forward workflow failed to merge \`main\` (${sha}) into the following feature branches:`,
              '',
              ...failed.map(s => `- \`feature/${s}\`: merge conflict, build failure, or test failure`),
              '',
              'Please resolve manually:',
              '```bash',
              ...failed.map(s => [
                `git checkout feature/${s}`,
                `git merge main`,
                `# resolve conflicts, then: git push`,
                ''
              ]).flat(),
              '```',
              '',
              `Triggered by push to main: ${context.sha}`
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Merge-forward failed for ${failed.length} feature branch(es) after ${sha}`,
              body,
              labels: ['maintenance']
            });
