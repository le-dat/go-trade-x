name: Docker CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build_and_test_docker:
    runs-on: ubuntu-latest

    # Use working-directory if the source is located in the GoTradeX subdirectory
    # If GoTradeX is the root directory of the repo, remove this line.
    working-directory: ./GoTradeX

    steps:
    - name: Checkout repository
      uses: actions/actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Set up Go (Optional but good for caching)
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Ensure go.sum exists (Optional fail-safe)
      run: |
        go mod tidy
        go mod download

    - name: Build and Start Containers (make docker-up)
      run: |
        make docker-up

    - name: Verify Containers are Running
      run: |
        echo "Waiting for containers to initialize..."
        sleep 15
        
        # Check if any containers have exited
        FAILED_CONTAINERS=$(docker ps -a --filter "status=exited" --format "{{.Names}}")
        if [ ! -z "$FAILED_CONTAINERS" ]; then
          echo "ERROR: The following containers failed to start or crashed:"
          echo "$FAILED_CONTAINERS"
          
          # Print logs of crashed containers for debugging
          for container in $FAILED_CONTAINERS; do
            echo "--- Logs for $container ---"
            docker logs $container
          done
          
          exit 1
        fi
        
        echo "All containers are running successfully."
        docker ps

    - name: Clean up (make docker-down)
      if: always() # Always clean up whether it passes or fails
      run: |
        make docker-down
