name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'
          cache: true
          
      - name: Install dependencies
        run: go mod download
        
      - name: Build
        run: make build
        
      - name: Test
        run: make test
