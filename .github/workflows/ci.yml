name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'

      - name: Verify dependencies
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum
          
      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...
