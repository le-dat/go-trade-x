name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.23.0
          cache: true

      - name: Install dependencies
        run: go mod download

      - name: Format check
        run: |
          go fmt ./...
          git diff --exit-code

      - name: Static Analysis
        run: go vet ./...

      - name: Build
        run: make build

      - name: Tests
        run: make test
