syntax = "proto3";

package user;

option go_package = "github.com/verno/gotradex/proto";

service UserService {
    rpc Register(RegisterRequest) returns (RegisterResponse);
    rpc Login(LoginRequest) returns (LoginResponse);
    rpc GetBalance(GetBalanceRequest) returns (GetBalanceResponse);
    rpc DeductBalance(DeductBalanceRequest) returns (DeductBalanceResponse);
    rpc CreditBalance(CreditBalanceRequest) returns (CreditBalanceResponse);
}

message RegisterRequest {
    string email = 1;
    string password = 2;
}

message RegisterResponse {
    string user_id = 1;
    string email = 2;
}

message LoginRequest {
    string email = 1;
    string password = 2;
}

message LoginResponse {
    string token = 1;
    string user_id = 2;
    string email = 3;
}

message GetBalanceRequest {
    string user_id = 1;
}

message Balance {
    string asset = 1;
    double available = 2;
    double locked = 3;
}

message GetBalanceResponse {
    string user_id = 1;
    repeated Balance balances = 2;
}

message DeductBalanceRequest {
    string user_id = 1;
    string asset = 2;
    double amount = 3;
}

message DeductBalanceResponse {
    bool success = 1;
    double new_balance = 2;
}

message CreditBalanceRequest {
    string user_id = 1;
    string asset = 2;
    double amount = 3;
}

message CreditBalanceResponse {
    bool success = 1;
    double new_balance = 2;
}
